# Required GitHub secrets:
#   EC2_HOST   — public IP or hostname of the EC2 instance
#   EC2_USER   — SSH user (e.g. ubuntu)
#   EC2_SSH_KEY — private key whose public key is in EC2 ~/.ssh/authorized_keys

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Pull latest code on EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/news_agent
            git fetch origin main
            git reset --hard origin/main
            source .venv/bin/activate
            pip install -r requirements.txt --quiet
            DEPLOY_LOCAL_DIR=/var/www/forwardforecasting/globalnews python main.py --regenerate
            echo "✓ Global News deployed at $(date -u)"
